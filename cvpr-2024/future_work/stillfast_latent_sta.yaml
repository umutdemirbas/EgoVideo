NUM_DEVICES: 4
TASK: 'stillfast_latent_sta'
SAVE_TOP_K: 1
ENABLE_LOGGING: True
CHECKPOINT_FILE_PATH: ""
FAST_DEV_RUN: False

# Data configuration
DATA:
  STILL:
    MIN_SIZE: [640, 672, 704, 736, 768, 800]
    MAX_SIZE: 1333
    FAST_TO_STILL_SIZE_RATIO: 0.32
  FAST:
    NUM_FRAMES: 9  # 9 frames: two overlapping 8-frame sequences with 1-frame offset
    SAMPLING_RATE: 4

MODEL:
  NAME: stillfast_latent_sta
  NUM_VERBS: 81
  NUM_NOUNS: 128
  
  # StillFast backbone configuration (with EgoVideo-V)
  STILLFAST:
    NAME: stillfast
    FREEZE: True
  
  # LAS latent model configuration
  LATENT:
    CONFIG_PATH: /cluster/scratch/udemirbas/LAS/configs/latent/model_config.yaml
    FREEZE_ENCODER: False
  
  # Loss weights [verb, noun, ttc]
  STA_LOSS_WEIGHTS: [1.0, 1.0, 1.0]

SOLVER:
  BASE_LR: 0.0001
  WEIGHT_DECAY: 0.0001
  MAX_EPOCH: 20
  LR_POLICY: multistep_warmup
  GAMMA: 0.1
  WARMUP_STEPS: 4000
  MILESTONES: [15, 30]
  ACCELERATOR: "gpu"
  STRATEGY: "ddp"
  PRECISION: 16
  BENCHMARK: True
  REPLACE_SAMPLER_DDP: True
EGO4D_STA:
  STILL_FRAMES_PATH: ../data/short_term_anticipation/still_img_v1
  FAST_LMDB_PATH: ../data/short_term_anticipation/fast_lmdb_v1_6s/
  ANNOTATION_DIR: ../ego4d_data/v1/annotations/
  TRAIN_LISTS: [fho_sta_train.json]
  VAL_LISTS: [fho_sta_val.json]
  TEST_LISTS: [fho_sta_test_unannotated.json]

TRAIN:
  ENABLE: True
  BATCH_SIZE: 8
  DATASET: "Ego4dShortTermAnticipationStillVideo"
  AUGMENTATIONS:
    RANDOM_HORIZONTAL_FLIP: True
  NUM_WORKERS: 8

VAL:
  ENABLE: True
  DATASET: "Ego4dShortTermAnticipationStillVideo"
  BATCH_SIZE: 16
  GROUP_BATCH_SAMPLER: True

TEST:
  ENABLE: True
  DATASET: "Ego4dShortTermAnticipationStillVideo"
  BATCH_SIZE: 4
  OUTPUT_JSON: ./results/egovideo_latent_sta_predictions.json

DATA_LOADER:
  NUM_WORKERS: 4

OUTPUT_DIR: ./outputs/egovideo_latent_sta
